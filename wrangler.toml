# ============================================================================
# NAF Accountant - Cloudflare Worker Configuration
# منصة "ناف لو" المحاسبية الذكية - إعدادات Cloudflare Worker
# ============================================================================

name = "naf-accountant"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ----------------------------------------------------------------------------
# Cloudflare D1 Database (قاعدة البيانات)
# أنشئ القاعدة أولاً:  wrangler d1 create naf-accountant-db
# ثم انسخ الـ database_id هنا.
# ----------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "naf-accountant-db"
database_id = "16fc771e-e3d6-4140-a651-1d7a3c215806"

# ----------------------------------------------------------------------------
# Cloudflare R2 Storage (تخزين الملفات: الصوتيات والفواتير)
# أنشئ الحاوية أولاً:  wrangler r2 bucket create naf-accountant-media
# ----------------------------------------------------------------------------
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "naf-accountant-media"

# ----------------------------------------------------------------------------
# Cloudflare Workers AI (نموذج Whisper لتحويل الصوت إلى نص)
# ----------------------------------------------------------------------------
[ai]
binding = "AI"

# ----------------------------------------------------------------------------
# Cron Triggers (المهام المجدولة - التقارير الشهرية لبيسكامب)
# يعمل في أول يوم من كل شهر الساعة 6 صباحاً (UTC)
# ----------------------------------------------------------------------------
[triggers]
crons = ["0 6 1 * *"]

# ============================================================================
# كل المتغيرات والأسرار تُدار من لوحة Cloudflare مباشرة — وليست في هذا الملف.
# ----------------------------------------------------------------------------
# لماذا؟ أي قيمة تُوضع هنا تحت [vars] سيعيد النشر كتابتها فوق ما تعدّله يدوياً
# في اللوحة. لذلك نتركها كلها في:
#   Workers & Pages → naf-accountant → Settings → Variables and secrets
#
# أضِف القيم التالية من اللوحة بنوع "Secret" (يبقى محفوظاً عبر عمليات النشر):
#
#   المفاتيح الحساسة:
#     CLAUDE_API_KEY
#     WAFEQ_API_KEY
#     BASECAMP_TOKEN
#     TELEGRAM_BOT_TOKEN
#     TELEGRAM_WEBHOOK_SECRET      # للتحقق من صحة طلبات الويبهوك
#     AUTHORIZED_CHAT_IDS          # معرّفات المحادثات المصرّح لها (مفصولة بفواصل)
#     DASHBOARD_API_KEY            # مفتاح حماية واجهة لوحة التحكم
#
#   معرّفات بيسكامب (أضِفها بنوع Secret أيضاً كي لا يمسحها النشر):
#     BASECAMP_ACCOUNT_ID
#     BASECAMP_PROJECT_ID
#     BASECAMP_MESSAGE_BOARD_ID
#
#   اختياري (للكود قيم افتراضية إن لم تُضبط):
#     CLAUDE_MODEL      (الافتراضي: claude-opus-4-8)
#     CLAUDE_API_BASE   (الافتراضي: https://api.anthropic.com/v1)
#     WAFEQ_API_BASE    (الافتراضي: https://api.wafeq.com/v1)
# ============================================================================
